name: Auto Commit After Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Check commit author
        id: check_author
        run: |
          AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')
          echo "Author email: $AUTHOR_EMAIL"

          if [ "$AUTHOR_EMAIL" = "faisalsaleem000786@gmail.com" ]; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if not matching author
        if: steps.check_author.outputs.match != 'true'
        run: exit 0

      - name: Make changes
        run: |
          echo "Auto updated at $(date)" >> auto-log.txt

      - name: Commit & Push
        run: |
          git config user.name "faisalskp"
          git config user.email "faisalsaleem000786@gmail.com"
          git add .
          git commit -m "Auto deployment is running successfully." || echo "No changes"
          git push
